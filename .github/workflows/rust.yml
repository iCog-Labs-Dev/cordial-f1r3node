name: Rust

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]
    # Explicitly including types ensures activity from forks triggers the CI
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout blocklace
      uses: actions/checkout@v4
      with:
        path: blocklace

    - name: Checkout f1r3node
      uses: actions/checkout@v4
      with:
        repository: F1R3FLY-io/f1r3node
        path: f1r3node

    - name: Install protoc
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install nightly toolchain
      uses: dtolnay/rust-toolchain@nightly

    # --- QUALITY CHECKS ---
    - name: Check Formatting
      working-directory: blocklace
      run: |
        cargo fmt -p cordial-miners-core --check
        cargo fmt -p cordial-f1r3node-adapter --check
        cargo fmt -p cordial-f1r3space-adapter --check

    - name: Lint with Clippy
      working-directory: blocklace
      run: |
        cargo clippy -p cordial-miners-core -p cordial-f1r3node-adapter -p cordial-f1r3space-adapter --all-targets --all-features --no-deps -- -D warnings

    # --- BUILD & TEST ---
    - name: Build
      working-directory: blocklace
      run: cargo build --verbose

    - name: Run tests
      working-directory: blocklace
      run: cargo test --verbose